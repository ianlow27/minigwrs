<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary Extractor</title>

<style>
body { font-family: Arial; padding:20px; }
textarea { width:100%; height:220px; margin-bottom:15px; padding:10px; }
button { padding:10px 20px; }
</style>
</head>

<body>

<h2>Input</h2>
<textarea id="inputBox"></textarea>

<button onclick="extract()">Extract</button>

<h2>Output</h2>
<textarea id="outputBox"></textarea>

<script>

function clean(text){
    return text
        .replace(/^[^\wŷŶŵŴÀ-ÿ']+/, "")
        .replace(/[)\s]+$/g,"")
        .trim();
}

function extract(){

    let input = document.getElementById("inputBox").value;
    const vocab = new Map();

    // ----------------------------
    // STEP 1: handle parentheses FIRST
    // ----------------------------
    const parenRegex = /\(([^)]*)\)/g;
    let match;

    while((match = parenRegex.exec(input)) !== null){

        let content = match[1];

        // CASE A: contains "="
        if(content.includes("=")){

            content.split("/").forEach(part => {

                if(part.includes("=")){

                    let [left, right] = part.split("=");

                    let word = clean(left).toLowerCase();
                    let meaning = clean(right);

                    if(word && meaning){
                        vocab.set(word, meaning);
                    }
                }
            });
        }

        // CASE B: no "=" → use preceding word
        else{

            let before = input.slice(0, match.index);
            let wordMatch = before.match(/([A-Za-zŷŶŵŴÀ-ÿ_\-']+)\s*$/);

            if(wordMatch){

                let word = wordMatch[1].toLowerCase();
                let meaning = clean(content);

                if(word && meaning){
                    vocab.set(word, meaning);
                }
            }
        }
    }

    // ----------------------------
    // STEP 2: REMOVE parentheses completely
    // ----------------------------
    input = input.replace(/\([^)]*\)/g, "");

    // ----------------------------
    // STEP 3: replace "/" with newlines
    // ----------------------------
    input = input.replace(/\//g, "\n");

    // ----------------------------
    // STEP 4: process remaining "=" lines
    // ----------------------------
    let lines = input.split("\n");

    lines.forEach(line => {

        line = clean(line);

        if(line.includes("=")){

            let [left, ...rest] = line.split("=");
            let right = rest.join("=");

            let wordMatch = left.match(/([A-Za-zŷŶŵŴÀ-ÿ_\-']+)\s*$/);

            if(wordMatch){

                let word = wordMatch[1].toLowerCase();
                let meaning = clean(right);

                if(word && meaning){
                    vocab.set(word, meaning);
                }
            }
        }
    });

    // ----------------------------
    // OUTPUT
    // ----------------------------
    document.getElementById("outputBox").value =
        [...vocab.entries()]
        .map(([w,m]) => w.toLowerCase() + " = " + m.toLowerCase())
        .join("\n");
}

</script>

</body>
</html>
